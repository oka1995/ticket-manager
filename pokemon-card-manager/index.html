<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケモンカード管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f7;--bg3:#ebebed;
  --text:#1c1c1e;--text2:#636366;--text3:#aeaeb2;
  --border:#e5e5ea;--border2:#d1d1d6;
  --blue:#185FA5;--green:#3B6D11;--amber:#854F0B;--red:#A32D2D;--purple:#534AB7;
  --radius:10px;--radius-sm:7px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN",Arial,sans-serif;background:var(--bg2);color:var(--text);font-size:14px;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:1rem}
/* url bar */
.url-bar{display:flex;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:12px;align-items:center}
.url-bar input{flex:1}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--text3)}
.conn-dot.ok{background:var(--green)}
.conn-dot.err{background:var(--red)}
/* header */
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.header h1{font-size:20px;font-weight:600}
.header p{font-size:12px;color:var(--text2);margin-top:2px}
.header-btns{display:flex;gap:8px;flex-wrap:wrap}
/* buttons */
.btn{border-radius:var(--radius-sm);padding:0 14px;height:34px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:opacity .15s}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{opacity:.82}
.btn-secondary{background:var(--bg);color:var(--text);border-color:var(--border2)}
.btn-secondary:hover{background:var(--bg2)}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:#fceaea}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.btn-ghost{background:transparent;border:none;color:var(--text2);padding:4px 8px;cursor:pointer;font-size:12px}
.btn-ghost:hover{color:var(--text)}
/* form */
input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:0 10px;height:34px;background:var(--bg);color:var(--text);width:100%}
textarea{padding:8px 10px;height:auto;min-height:60px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12)}
label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px}
/* tabs */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab.active{color:var(--text);font-weight:600;border-bottom-color:var(--text)}
.panel{display:none}
.panel.active{display:block}
/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--bg);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:600}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px}
/* table */
.table-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
th{background:var(--bg2);font-weight:600;color:var(--text2);font-size:11px;white-space:nowrap;position:sticky;top:0}
tr:hover td{background:var(--bg2)}
td.num{text-align:right;font-variant-numeric:tabular-nums}
.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px}
/* filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{width:auto;min-width:140px}
.spacer{flex:1}
/* badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;white-space:nowrap}
.b-買受{background:#E6F1FB;color:#185FA5}
.b-売却{background:#E1F5EE;color:#0F6E56}
.b-在庫中{background:#FAEEDA;color:#854F0B}
.b-売却済{background:#D3D1C7;color:#444441}
.b-返品{background:#FCEBEB;color:#A32D2D}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius);width:100%;max-width:720px;margin:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2);padding:4px 8px}
.modal-body{padding:18px}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* form grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.fg{margin-bottom:10px}
.fg-full{grid-column:1/-1}
.section-title{font-size:12px;font-weight:600;color:var(--text2);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
/* photo */
.photo-drop{border:2px dashed var(--border2);border-radius:var(--radius);padding:18px;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:14px}
.photo-drop:hover{border-color:var(--blue);background:var(--bg2)}
.photo-drop.loading{opacity:.6;pointer-events:none}
.photo-preview{max-width:200px;max-height:280px;border-radius:var(--radius-sm);margin:8px auto;display:block}
.photo-hint{font-size:11px;color:var(--text2);margin-top:6px}
/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;opacity:0;transition:all .3s;z-index:200;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--red)}
/* chart */
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:140px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;height:100%}
.bar{width:100%;background:var(--blue);border-radius:4px 4px 0 0;min-height:2px;transition:height .3s}
.bar.profit{background:var(--green)}
.bar-label{font-size:10px;color:var(--text2)}
.bar-value{font-size:10px;font-weight:600}
/* row actions */
.row-actions{display:flex;gap:4px}
.amount{font-weight:600;font-variant-numeric:tabular-nums}
.amount.profit{color:var(--green)}
.amount.loss{color:var(--red)}
/* responsive */
@media(max-width:640px){
  .app{padding:.5rem}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-value{font-size:18px}
}
</style>
</head>
<body>
<div class="app">

  <!-- 接続設定 -->
  <div class="url-bar">
    <span class="conn-dot" id="conn-dot"></span>
    <input type="url" id="gas-url" placeholder="GAS デプロイ URL を貼り付け" autocomplete="off">
    <button class="btn btn-primary btn-sm" onclick="connect()">接続＆初期化</button>
    <button class="btn btn-secondary btn-sm" onclick="loadAll()">再読込</button>
  </div>

  <!-- ヘッダー -->
  <div class="header">
    <div>
      <h1>ポケモンカード管理</h1>
      <p id="subtitle">古物台帳・在庫・売上を一元管理</p>
    </div>
    <div class="header-btns">
      <button class="btn btn-primary" onclick="openPurchaseModal()">＋ 仕入登録</button>
      <button class="btn btn-primary" onclick="openSaleModal()">＋ 売上登録</button>
    </div>
  </div>

  <!-- タブ -->
  <div class="tab-bar">
    <div class="tab active" data-tab="dashboard" onclick="switchTab(this)">ダッシュボード</div>
    <div class="tab" data-tab="furumono" onclick="switchTab(this)">古物台帳</div>
    <div class="tab" data-tab="inventory" onclick="switchTab(this)">在庫</div>
    <div class="tab" data-tab="sales" onclick="switchTab(this)">売上台帳</div>
    <div class="tab" data-tab="tax" onclick="switchTab(this)">税務レポート</div>
  </div>

  <div id="panel-dashboard" class="panel active"></div>
  <div id="panel-furumono"  class="panel"></div>
  <div id="panel-inventory" class="panel"></div>
  <div id="panel-sales"     class="panel"></div>
  <div id="panel-tax"       class="panel"></div>

</div>

<!-- モーダル -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 定数 ==========
const SHEET = { FURUMONO: '古物台帳', INVENTORY: '在庫台帳', SALES: '売上台帳', CONFIG: '設定' };

// ========== 状態 ==========
const state = {
  url: localStorage.getItem('gasUrl') || '',
  furumono: [],   // 古物台帳 rows (excluding header)
  inventory: [],  // 在庫台帳
  sales: [],      // 売上台帳
  config: {},     // { key: value }
  purchaseSources: [], sales_channels: [], locations: [], idCheckMethods: [],
  taxRate: 10,
};

// ========== ユーティリティ ==========
const $  = (s, el = document) => el.querySelector(s);
const $$ = (s, el = document) => Array.from(el.querySelectorAll(s));

const fmt  = n => n == null || n === '' ? '—' : Number(n).toLocaleString('ja-JP');
const fmtY = n => '¥' + fmt(n);
const today = () => new Date().toISOString().slice(0, 10);

const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function toast(msg, isErr = false) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => { t.className = 'toast' + (isErr ? ' err' : ''); }, 2600);
}

function setConn(status) {
  const dot = $('#conn-dot');
  dot.className = 'conn-dot' + (status === 'ok' ? ' ok' : status === 'err' ? ' err' : '');
}

// ========== API ==========
async function api(action, params = {}) {
  if (!state.url) throw new Error('GAS URL を設定してください');
  const res = await fetch(state.url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // CORS 回避: simple request
    body: JSON.stringify({ action, ...params }),
  });
  const body = await res.json();
  if (!body.ok) throw new Error(body.error || 'API エラー');
  return body;
}

// ========== 接続＆初期化 ==========
async function connect() {
  const url = $('#gas-url').value.trim();
  if (!url) { toast('GAS URL を入力してください', true); return; }
  state.url = url;
  localStorage.setItem('gasUrl', url);
  try {
    await api('init');
    toast('シートを初期化しました');
    await loadAll();
  } catch (e) {
    setConn('err');
    toast('接続失敗: ' + e.message, true);
  }
}

async function loadAll() {
  if (!state.url) { setConn(''); return; }
  try {
    const { data } = await api('readAll');
    state.furumono  = (data[SHEET.FURUMONO]  || []).slice(1);
    state.inventory = (data[SHEET.INVENTORY] || []).slice(1);
    state.sales     = (data[SHEET.SALES]     || []).slice(1);
    const configRows = (data[SHEET.CONFIG] || []).slice(1);
    state.config = Object.fromEntries(configRows.map(r => [r[0], r[1]]));
    state.purchaseSources = [];  // 仕入先は自由入力
    state.sales_channels  = Object.keys(state.config).filter(k => k.startsWith('販路_')).map(k => state.config[k]).filter(Boolean);
    state.locations       = Object.keys(state.config).filter(k => k.startsWith('保管場所_')).map(k => state.config[k]).filter(Boolean);
    state.idCheckMethods  = Object.keys(state.config).filter(k => k.startsWith('確認方法_')).map(k => state.config[k]).filter(Boolean);
    state.taxRate         = Number(state.config['消費税率'] || 10);
    setConn('ok');
    renderAll();
    toast('データを読み込みました');
  } catch (e) {
    setConn('err');
    toast('読み込み失敗: ' + e.message, true);
  }
}

// ========== タブ切替 ==========
function switchTab(el) {
  $$('.tab').forEach(t => t.classList.toggle('active', t === el));
  const tab = el.dataset.tab;
  $$('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  renderTab(tab);
}

function renderAll() {
  const active = $('.tab.active')?.dataset.tab || 'dashboard';
  renderTab(active);
}

function renderTab(tab) {
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'furumono')  renderFurumono();
  if (tab === 'inventory') renderInventory();
  if (tab === 'sales')     renderSales();
  if (tab === 'tax')       renderTax();
}

// ========== 初期化 ==========
window.addEventListener('DOMContentLoaded', () => {
  $('#gas-url').value = state.url;
  if (state.url) loadAll();
  else renderTab('dashboard');
});

// ========== ダッシュボード ==========
function renderDashboard() {
  const stockQty = state.inventory.filter(r => r[13] !== '売却済').reduce((s, r) => s + (Number(r[9]) || 0), 0);
  const stockVal = state.inventory.filter(r => r[13] !== '売却済').reduce((s, r) => s + (Number(r[10]) || 0), 0);

  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();

  let monthSales = 0, monthProfit = 0;
  let totalSales = 0, totalProfit = 0;

  // 過去6ヶ月のバーチャート用集計
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(y, m - i, 1);
    months.push({ y: d.getFullYear(), m: d.getMonth() + 1, sales: 0, profit: 0 });
  }

  state.sales.forEach(r => {
    const d = r[3] ? new Date(r[3]) : null;
    const net = Number(r[12]) || 0;
    const profit = Number(r[14]) || 0;
    totalSales += net; totalProfit += profit;
    if (d && d.getFullYear() === y && d.getMonth() === m) {
      monthSales += net; monthProfit += profit;
    }
    if (d) {
      const mo = months.find(x => x.y === d.getFullYear() && x.m === d.getMonth() + 1);
      if (mo) { mo.sales += net; mo.profit += profit; }
    }
  });

  const maxBar = Math.max(1, ...months.map(x => x.sales));
  const barsHtml = months.map(x => {
    const h = (x.sales / maxBar) * 100;
    const hp = x.profit > 0 ? (x.profit / maxBar) * 100 : 0;
    return `<div class="bar-col" title="売上 ${fmtY(x.sales)} / 粗利 ${fmtY(x.profit)}">
      <div class="bar-value">${x.sales > 0 ? fmtY(x.sales) : ''}</div>
      <div class="bar" style="height:${h}%"></div>
      <div class="bar-label">${x.m}月</div>
    </div>`;
  }).join('');

  // 最近の取引
  const recent = [...state.furumono].slice(-8).reverse();
  const recentHtml = recent.length === 0
    ? '<div class="empty">取引履歴はありません</div>'
    : `<table><thead><tr>
        <th>日付</th><th>区分</th><th>カード</th><th class="num">代価</th><th>相手方</th>
      </tr></thead><tbody>${recent.map(r => `
        <tr>
          <td>${esc(fmtDate(r[1]))}</td>
          <td><span class="badge b-${esc(r[2])}">${esc(r[2])}</span></td>
          <td>${esc(r[3])}<br><small style="color:var(--text2)">${esc(r[4] || '')} ${esc(r[6] || '')}</small></td>
          <td class="num">${fmtY(r[9])}</td>
          <td>${esc(r[11] || '—')}</td>
        </tr>`).join('')}</tbody></table>`;

  $('#panel-dashboard').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-label">在庫点数</div><div class="stat-value">${fmt(stockQty)}</div><div class="stat-sub">枚</div></div>
      <div class="stat"><div class="stat-label">在庫評価額（仕入原価）</div><div class="stat-value">${fmtY(stockVal)}</div></div>
      <div class="stat"><div class="stat-label">今月 純売上</div><div class="stat-value">${fmtY(monthSales)}</div></div>
      <div class="stat"><div class="stat-label">今月 粗利</div><div class="stat-value">${fmtY(monthProfit)}</div><div class="stat-sub">累計粗利 ${fmtY(totalProfit)}</div></div>
    </div>
    <div class="section-title">過去6ヶ月 売上推移</div>
    <div class="bar-chart">${barsHtml}</div>
    <div class="section-title">最近の取引</div>
    <div class="table-wrap">${recentHtml}</div>
  `;
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return String(d);
  return dt.toISOString().slice(0, 10);
}

// ========== 古物台帳 ==========
function renderFurumono() {
  const filterKind = $('#fur-kind')?.value || '';
  const filterMonth = $('#fur-month')?.value || '';
  const search = ($('#fur-search')?.value || '').toLowerCase();

  const rows = state.furumono.filter(r => {
    if (filterKind && r[2] !== filterKind) return false;
    if (filterMonth) {
      const d = r[1] ? fmtDate(r[1]) : '';
      if (!d.startsWith(filterMonth)) return false;
    }
    if (search) {
      const text = [r[0], r[3], r[4], r[11]].join(' ').toLowerCase();
      if (!text.includes(search)) return false;
    }
    return true;
  });

  const rowsHtml = rows.length === 0
    ? '<tr><td colspan="9" class="empty">該当データがありません</td></tr>'
    : rows.map((r, i) => {
        const realIndex = state.furumono.indexOf(r);
        return `<tr>
          <td>${esc(r[0])}</td>
          <td>${esc(fmtDate(r[1]))}</td>
          <td><span class="badge b-${esc(r[2])}">${esc(r[2])}</span></td>
          <td>${esc(r[3])}<br><small style="color:var(--text2)">${esc(r[4] || '')} ${esc(r[6] || '')} ${esc(r[7] || '')}</small></td>
          <td class="num">${esc(r[8])}</td>
          <td class="num">${fmtY(r[9])}</td>
          <td>${esc(r[11] || '—')}<br><small style="color:var(--text2)">${esc(r[15] || '')}</small></td>
          <td>${esc(r[16] || '')}</td>
          <td><div class="row-actions">
            <button class="btn btn-secondary btn-sm" onclick="editFurumono(${realIndex})">編集</button>
            <button class="btn btn-danger btn-sm" onclick="deleteFurumono(${realIndex})">削除</button>
          </div></td>
        </tr>`;
      }).join('');

  $('#panel-furumono').innerHTML = `
    <div class="filter-bar">
      <select id="fur-kind" onchange="renderFurumono()">
        <option value="">全区分</option>
        <option value="買受">買受</option>
        <option value="売却">売却</option>
      </select>
      <input type="month" id="fur-month" onchange="renderFurumono()" value="${filterMonth}">
      <input type="search" id="fur-search" placeholder="カード名・相手方で検索" oninput="renderFurumono()" value="${esc(search)}">
      <div class="spacer"></div>
      <button class="btn btn-secondary btn-sm" onclick="exportFurumonoCsv()">CSV 出力</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>台帳No</th><th>取引日</th><th>区分</th><th>カード</th>
        <th class="num">数量</th><th class="num">代価</th>
        <th>相手方（確認方法）</th><th>在庫ID</th><th></th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></div>
    <p style="margin-top:10px;font-size:11px;color:var(--text2)">
      古物営業法に基づき3年間保管してください。買受 1万円以上または特定対象物品は相手方確認が必須です。
    </p>
  `;

  // フィルタ入力を復元
  if (filterKind)  $('#fur-kind').value  = filterKind;
  if (filterMonth) $('#fur-month').value = filterMonth;
}

// ========== 在庫 ==========
function renderInventory() {
  const filterStatus = $('#inv-status')?.value || '在庫中';
  const search = ($('#inv-search')?.value || '').toLowerCase();

  const rows = state.inventory.filter(r => {
    if (filterStatus && (r[13] || '在庫中') !== filterStatus) return false;
    if (search) {
      const text = [r[0], r[3], r[4], r[11]].join(' ').toLowerCase();
      if (!text.includes(search)) return false;
    }
    return true;
  });

// ========== 税務レポート ==========
function renderTax() {
  const year = $('#tax-year')?.value || String(new Date().getFullYear());
  const yNum = Number(year);

  const months = Array.from({ length: 12 }, (_, i) => ({
    m: i + 1, sales: 0, cost: 0, fee: 0, ship: 0, profit: 0, count: 0,
  }));

  state.sales.forEach(r => {
    const d = r[3] ? new Date(r[3]) : null;
    if (!d || d.getFullYear() !== yNum) return;
    const mo = months[d.getMonth()];
    mo.sales  += Number(r[12]) || 0; // 純売上
    mo.cost   += Number(r[13]) || 0; // 仕入原価
    mo.fee    += Number(r[10]) || 0;
    mo.ship   += Number(r[11]) || 0;
    mo.profit += Number(r[14]) || 0;
    mo.count  += 1;
  });

  const total = months.reduce((a, m) => ({
    sales: a.sales + m.sales, cost: a.cost + m.cost, fee: a.fee + m.fee,
    ship: a.ship + m.ship, profit: a.profit + m.profit, count: a.count + m.count,
  }), { sales: 0, cost: 0, fee: 0, ship: 0, profit: 0, count: 0 });

  // 年末在庫評価額
  const stockVal = state.inventory.filter(r => r[13] !== '売却済').reduce((s, r) => s + (Number(r[10]) || 0), 0);

  const rowsHtml = months.map(m => `
    <tr>
      <td>${m.m}月</td>
      <td class="num">${m.count}</td>
      <td class="num">${fmtY(m.sales)}</td>
      <td class="num">${fmtY(m.cost)}</td>
      <td class="num" style="color:var(--text2)">${fmtY(m.fee + m.ship)}</td>
      <td class="num amount ${m.profit >= 0 ? 'profit' : 'loss'}">${fmtY(m.profit)}</td>
    </tr>`).join('') + `
    <tr style="background:var(--bg2);font-weight:600">
      <td>合計</td>
      <td class="num">${total.count}</td>
      <td class="num">${fmtY(total.sales)}</td>
      <td class="num">${fmtY(total.cost)}</td>
      <td class="num">${fmtY(total.fee + total.ship)}</td>
      <td class="num amount ${total.profit >= 0 ? 'profit' : 'loss'}">${fmtY(total.profit)}</td>
    </tr>`;

  const years = [];
  const curY = new Date().getFullYear();
  for (let y = curY; y >= curY - 5; y--) years.push(y);

  $('#panel-tax').innerHTML = `
    <div class="filter-bar">
      <select id="tax-year" onchange="renderTax()">
        ${years.map(y => `<option value="${y}"${String(y) === year ? ' selected' : ''}>${y}年</option>`).join('')}
      </select>
      <div class="spacer"></div>
      <button class="btn btn-secondary btn-sm" onclick="exportTaxCsv()">税務CSV 出力</button>
      <button class="btn btn-secondary btn-sm" onclick="exportAllCsv()">全データCSV 出力</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">年間 純売上</div><div class="stat-value">${fmtY(total.sales)}</div></div>
      <div class="stat"><div class="stat-label">年間 売上原価</div><div class="stat-value">${fmtY(total.cost)}</div></div>
      <div class="stat"><div class="stat-label">年間 粗利</div><div class="stat-value">${fmtY(total.profit)}</div></div>
      <div class="stat"><div class="stat-label">期末在庫評価額</div><div class="stat-value">${fmtY(stockVal)}</div><div class="stat-sub">仕入原価ベース</div></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>月</th><th class="num">件数</th><th class="num">純売上</th><th class="num">売上原価</th><th class="num">手数料+送料</th><th class="num">粗利</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></div>
    <p style="margin-top:10px;font-size:11px;color:var(--text2)">
      法人決算にご利用ください。売上原価は売却済カードの仕入単価×数量で計算しています。期末棚卸額は在庫中カードの仕入合計の合算です。
    </p>
  `;
}

async function handlePhotoSelect(e) {
  const file = e.target.files?.[0];
  if (!file) return;
  const drop = $('#photo-drop');
  drop.classList.add('loading');
  drop.innerHTML = '<div>🔍 Claude が解析中...</div>';
  try {
    const dataUrl = await fileToDataUrl(file);
    const base64 = dataUrl.split(',')[1];
    const mime = (dataUrl.match(/^data:([^;]+);/) || [])[1] || 'image/jpeg';
    const { data } = await api('analyzeCard', { imageBase64: base64, mimeType: mime });
    if (data.cardName)  $('#f-name').value   = data.cardName;
    if (data.set)       $('#f-set').value    = data.set;
    if (data.language)  $('#f-lang').value   = data.language;
    if (data.rarity)    $('#f-rarity').value = data.rarity;
    if (data.condition || data.grade) $('#f-grade').value = [data.grade, data.condition].filter(Boolean).join(' / ');
    drop.innerHTML = `<img src="${dataUrl}" class="photo-preview"><div class="photo-hint">✓ 解析完了（内容を確認して編集してください）</div>`;
    toast('写真からカード情報を取得しました');
  } catch (err) {
    drop.innerHTML = `<div style="color:var(--red)">⚠ 解析失敗: ${esc(err.message)}</div><div class="photo-hint">手入力で続行できます</div>`;
    toast('解析失敗: ' + err.message, true);
  } finally {
    drop.classList.remove('loading');
  }
}

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function onSaleInvChange() {
  const invId = $('#s-inv').value;
  const row = state.inventory.find(r => r[0] === invId);
  if (row) {
    $('#s-qty').value = row[9];
    $('#s-qty').max = row[9];
  }
  updateSaleCalc();
}

function updateSaleCalc() {
  const price = Number($('#s-price')?.value) || 0;
  const qty   = Number($('#s-qty')?.value) || 0;
  const feeR  = Number($('#s-feerate')?.value) || 0;
  const ship  = Number($('#s-ship')?.value) || 0;

  const invId = $('#s-inv')?.value;
  const inv   = state.inventory.find(r => r[0] === invId);
  const unitCost = inv ? Number(inv[8]) || 0 : 0;

  const subtotal = price * qty;
  const fee = Math.round(subtotal * feeR / 100);
  const net = subtotal - fee - ship;
  const cost = unitCost * qty;
  const profit = net - cost;
  const profitRate = net > 0 ? (profit / net * 100) : 0;

  const calc = $('#s-calc');
  if (calc) {
    calc.innerHTML = `
      売却小計: <b>${fmtY(subtotal)}</b><br>
      手数料: -${fmtY(fee)} / 送料: -${fmtY(ship)}<br>
      純売上: <b>${fmtY(net)}</b><br>
      仕入原価: -${fmtY(cost)}<br>
      粗利: <b class="${profit >= 0 ? 'amount profit' : 'amount loss'}">${fmtY(profit)}</b>
      <span style="color:var(--text2)">（${profitRate.toFixed(1)}%）</span>
    `;
  }
}

async function submitSale() {
  const invId = $('#s-inv').value;
  const date  = $('#s-date').value;
  const ch    = $('#s-channel').value;
  const price = Number($('#s-price').value) || 0;
  const qty   = Number($('#s-qty').value) || 0;
  if (!invId || !date || !ch || price <= 0 || qty <= 0) {
    toast('必須項目を入力してください', true); return;
  }

  const invRealIndex = state.inventory.findIndex(r => r[0] === invId);
  if (invRealIndex < 0) { toast('在庫が見つかりません', true); return; }
  const inv = state.inventory[invRealIndex];
  const invRowIndex = invRealIndex + 2; // +1 header, +1 to 1-based

  const unitCost = Number(inv[8]) || 0;
  const feeR = Number($('#s-feerate').value) || 0;
  const ship = Number($('#s-ship').value) || 0;
  const subtotal = price * qty;
  const fee = Math.round(subtotal * feeR / 100);
  const net = subtotal - fee - ship;
  const cost = unitCost * qty;
  const profit = net - cost;
  const profitRate = net > 0 ? Math.round(profit / net * 1000) / 10 : 0;

  try {
    const saleId = (await api('nextId', { sheet: SHEET.SALES,    prefix: 'S' })).id;
    const furNo  = (await api('nextId', { sheet: SHEET.FURUMONO, prefix: 'F' })).id;

    const sale = [
      saleId, invId, furNo, date, inv[3],
      ch, price, qty, subtotal,
      feeR, fee, ship, net,
      cost, profit, profitRate,
      $('#s-buyer').value, $('#s-memo').value,
    ];

    const furumono = [
      furNo, date, '売却',
      inv[3], inv[4], inv[5], inv[6], inv[7], qty,
      subtotal, state.taxRate,
      $('#s-buyer').value, '', '', '', 'オンライン（非対面）',
      invId, `販路: ${ch}`,
    ];

    // 在庫ステータス更新（売却済に）
    const updatedInv = [...inv];
    updatedInv[13] = qty >= Number(inv[9]) ? '売却済' : '在庫中';
    if (qty < Number(inv[9])) updatedInv[9] = Number(inv[9]) - qty;

    await api('registerSale', {
      sale, furumono,
      inventoryRowIndex: invRowIndex,
      inventoryUpdated: updatedInv,
    });

    closeModal();
    toast(`売上登録: ${saleId}`);
    await loadAll();
  } catch (e) {
    toast('登録失敗: ' + e.message, true);
  }
}

// ========== CSV エクスポート ==========
function downloadCsv(filename, rows) {
  const csv = rows.map(r => r.map(c => {
    const v = c == null ? '' : String(c);
    return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
  }).join(',')).join('\r\n');
  const bom = '﻿'; // Excel 向け
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportFurumonoCsv() {
  const header = [
    '台帳No', '取引日', '取引区分', 'カード名', '拡張パック', '言語', 'レアリティ',
    'グレード/状態', '数量', '代価（税込）', '消費税率(%)',
    '相手方氏名', '相手方住所', '相手方職業', '相手方年齢', '確認方法', '在庫ID', '備考',
  ];
  const rows = state.furumono.map(r => r.map((v, i) => i === 1 ? fmtDate(v) : v));
  const ym = new Date().toISOString().slice(0, 7);
  downloadCsv(`古物台帳_${ym}.csv`, [header, ...rows]);
  toast('古物台帳 CSV を出力しました');
}

function exportTaxCsv() {
  const year = Number($('#tax-year')?.value || new Date().getFullYear());
  const header = ['年', '月', '件数', '純売上', '売上原価', '手数料', '送料', '粗利'];
  const months = Array.from({ length: 12 }, (_, i) => ({
    m: i + 1, count: 0, sales: 0, cost: 0, fee: 0, ship: 0, profit: 0,
  }));
  state.sales.forEach(r => {
    const d = r[3] ? new Date(r[3]) : null;
    if (!d || d.getFullYear() !== year) return;
    const mo = months[d.getMonth()];
    mo.count += 1;
    mo.sales  += Number(r[12]) || 0;
    mo.cost   += Number(r[13]) || 0;
    mo.fee    += Number(r[10]) || 0;
    mo.ship   += Number(r[11]) || 0;
    mo.profit += Number(r[14]) || 0;
  });
  const rows = months.map(m => [year, m.m, m.count, m.sales, m.cost, m.fee, m.ship, m.profit]);
  downloadCsv(`税務レポート_${year}.csv`, [header, ...rows]);
  toast('税務レポート CSV を出力しました');
}
